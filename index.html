<html lang="pt-BR">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Consulta de Declaração</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f5f7fb;
font-family: system-ui;
}

.titulo{
font-size:40px;
font-weight:bold;
color:#1f2937;
}

.btn-roxo{
background:#6b46ff;
color:white;
}

.btn-roxo:hover{
background:#5538cc;
}

.logo{
    width: 150px;
    height: auto;
}

</style>

</head>


<body class="flex items-center justify-center h-screen">



<div class="text-center max-w-lg">

    <img src="logo.png" class="logo mx-auto"/>

<h1 class="titulo">Consulta de Declaração</h1>

<p class="text-gray-500 mt-2">
Digite seu CPF para acessar sua Declaração
</p>


<div class="bg-white shadow-xl rounded-xl p-8 mt-6">

<input
type="text"
id="cpf"
placeholder="000.000.000-00"
maxlength="14"
class="input input-bordered w-full text-center text-lg"
/>

<button onclick="buscarCPF()" class="btn btn-roxo w-full mt-4">
Consultar
</button>

<div id="resultado" class="mt-6"></div>

</div>

</div>

<script>

// máscara de CPF
const cpfInput = document.getElementById("cpf")

cpfInput.addEventListener("input", function(){

let value = cpfInput.value.replace(/\D/g,"")

value = value.replace(/(\d{3})(\d)/,"$1.$2")
value = value.replace(/(\d{3})(\d)/,"$1.$2")
value = value.replace(/(\d{3})(\d{1,2})$/,"$1-$2")

cpfInput.value = value

})

// função de busca
function buscarCPF(){

let cpf = document.getElementById("cpf").value.replace(/\D/g,"")

let aluno = alunos.find(a => a.CPF.replace(/\D/g,"") === cpf)

let resultado = document.getElementById("resultado")

if(aluno){

resultado.innerHTML = `
<a href="${aluno.link}" target="_blank" class="btn btn-success w-full">
Abrir minha declaração
</a>
`

}else{

resultado.innerHTML = `
<p class="text-red-500 font-semibold">
CPF não encontrado
</p>
`

}

}

</script>
